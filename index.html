<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSOps Gatekeeper — Best Version Media</title>
<!-- xlsx.js removed: file parsing is now handled by the Flask backend -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f1f5f9;min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:#0f172a;}
:root{
  --navy:#243454;--navy-dark:#1a2740;--navy-mid:#2e4068;--navy-pale:#eef1f7;
  --card:#fff;--card-alt:#f8fafc;--border:#e2e8f0;--border-mid:#cbd5e1;
  --text:#0f172a;--text-mid:#374151;--text-muted:#64748b;--text-light:#94a3b8;
  --success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;
  --warning:#d97706;--warning-bg:#fffbeb;--warning-border:#fde68a;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fecaca;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#ddd6fe;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-wrap{overflow:hidden;background:#1a2740;border-top:1px solid rgba(255,255,255,0.1);padding:0;}
.ticker-inner{display:flex;white-space:nowrap;animation:marquee 32s linear infinite;}
.ticker-item{padding:7px 22px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:rgba(255,255,255,0.75);letter-spacing:0.06em;border-right:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
.ticker-pos{color:#4ade80;}.ticker-neg{color:#f87171;}.ticker-mute{color:rgba(255,255,255,0.35);margin-right:6px;}
.demo-banner{background:linear-gradient(90deg,#d97706,#b45309);color:#fff;text-align:center;padding:6px 16px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
.fade{animation:fadeUp 0.25s ease}
.slot{transition:all 0.2s;cursor:pointer;}
.slot:hover{border-color:var(--navy)!important;background:var(--navy-pale)!important;}
.tab-btn{background:none;border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'Inter',system-ui,sans-serif;}
.tab-btn:hover{color:var(--navy)!important;}
.seg-row:hover{background:var(--navy-pale)!important;}
.guide-btn{transition:all 0.15s;}
.guide-btn:hover{border-color:var(--navy)!important;background:var(--navy-pale)!important;}
select,input,textarea{font-family:'Inter',system-ui,sans-serif;}
select:focus,input:focus,textarea:focus{outline:2px solid #24345444;outline-offset:1px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;border:1px solid;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.mcard .label{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.mcard .value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.mcard .sub{font-size:10px;color:var(--text-light);margin-top:5px;}
.sl{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.sl::before{content:'';width:3px;height:16px;background:var(--navy);border-radius:2px;flex-shrink:0;}
.sl span{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:0.08em;text-transform:uppercase;}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const NAVY='#243454',NAVY_DARK='#1a2740',NAVY_MID='#2e4068',NAVY_PALE='#eef1f7';
const BANDWIDTH_CEILING=500;
const WEEK_LABEL='Current Week';

const CS_REPS={
  'Kala McNeely':'kmcneely',
  'Samantha Marcus':'samanthamarcus',
  'Genele Ekinde':'gekinde',
  'Karen Guirguis':'kguirguis',
  'April Dippolito':'adippolito',
  'Alex Polivka':'apolivka'
};
const CS_REP_NAMES=Object.keys(CS_REPS);

// ── GRR Contest April 1 – December 31 2026 ──────────────────────
const CONTEST_START_DATE=new Date('2026-04-01');
const CONTEST_TEAM1=['Kala McNeely','Karen Guirguis','Genele Ekinde'];
const CONTEST_TEAM2=['Samantha Marcus','April Dippolito','Alex Polivka'];
const CONTEST_BOB={
  'Kala McNeely':8600000,'Karen Guirguis':5400000,'Genele Ekinde':5300000,
  'Samantha Marcus':11000000,'April Dippolito':3300000,'Alex Polivka':4200000
};

const CSOPS_SYSTEM=`You are Bruno. Execution partner for CSOps at Best Version Media. RUN HANK = Layer 1 truth. RUN BRUNO = Layer 2 evaluation. Never recalculate Layer 1 metrics. Coaching covers all 6 reps. Kala McNeely and Samantha Marcus coach directly from this document. All actions executable Monday morning. Flag any metric derived from unpopulated penetration fields as ESTIMATED.`;

const DROPDOWN={
  contacted:['','Yes','No'],
  contactType:['','Call','Email','Virtual Meeting','Text'],
  status:['','Active Conversation','No Response','Save Closed','Declined Confirmed','Escalated'],
  blocker:['','Price','Timing','Decision Maker','No Response','Competition','Other'],
  saveOfferOutcome:['','Accepted','Rejected','Pending','No Offer Extended'],
  idp:['','Yes','No']
};

// ============================================================
// STATE
// ============================================================
let state={
  files:{},
  hankDone:false,
  hankRunning:false,
  hankStep:0,
  hankError:null,
  brunoOpen:false,
  brunoRunning:false,
  brunoOutput:null,
  brunoError:null,
  brunoGuideStep:0,
  dlDone:false,
  activeTab:0,
  segCategory:'declined',
  manualContexts:{},
  pack:null,      // the processed data from RUN HANK
  segData:{declined:[],printOnly:[],renewable:[]},
  upsellLog:[],   // GRR contest upsell entries (session memory)
  secs:0,
  timer:null,
  demoMode:false
};

// ============================================================
// UTILITY
// ============================================================
const $=id=>document.getElementById(id);
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const fmt$=v=>v==null||isNaN(v)?'—':'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtPct=v=>v==null||isNaN(v)?'—':Number(v).toFixed(1)+'%';
const tierColor=t=>{if(!t)return'#64748b';const v=t.toLowerCase();if(v.includes('excellent'))return'#16a34a';if(v.includes('healthy'))return'#2563eb';if(v.includes('watchlist'))return'#d97706';if(v.includes('risk'))return'#dc2626';return'#64748b';};
const tierBg=t=>{if(!t)return'#fff';const v=t.toLowerCase();if(v.includes('excellent'))return'#f0fdf4';if(v.includes('healthy'))return'#eff6ff';if(v.includes('watchlist'))return'#fffbeb';if(v.includes('risk'))return'#fef2f2';return'#fff';};
const healthTier=s=>{if(s>=85)return'Excellent';if(s>=70)return'Healthy';if(s>=55)return'Watchlist';return'At Risk';};
// 4-Factor helpers — used at render time so engagement updates live
const engPts=row=>{const c=row.contacted==='Yes';const s=!!(row.statusField&&String(row.statusField).trim());const n=!!(row.nextStep&&String(row.nextStep).trim());return c&&s&&n?10:c&&s?6:c?3:0;};
const clientHealthScore=row=>(row._health_base||0)+engPts(row);

function startTimer(){
  clearInterval(state.timer);
  const t0=Date.now();
  state.timer=setInterval(()=>{
    state.secs=((Date.now()-t0)/1000).toFixed(1);
    const el=$('timer-display');
    if(el)el.textContent=state.secs+'s';
  },100);
}
function stopTimer(){clearInterval(state.timer);state.secs=0;}

// ============================================================
// FILE READING
// ============================================================
function readXlsx(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{defval:null});
        resolve(data);
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

function readTextFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.onerror=reject;
    reader.readAsText(file);
  });
}

// ============================================================
// AGREEMENT NUMBER EXTRACTION
// ============================================================
function extractAgreementNumber(str){
  if(!str)return null;
  // Match E-XXXXXX pattern (with optional suffix like -1, -2)
  const match=String(str).match(/E-\d+(?:-\d+)?/i);
  return match?match[0].toUpperCase():null;
}

// ============================================================
// CSOPS REP MATCHING
// ============================================================
function matchCSOpsRep(repField){
  if(!repField)return null;
  const rf=String(repField).toLowerCase();
  for(const name of CS_REP_NAMES){
    const parts=name.toLowerCase().split(' ');
    if(parts.every(p=>rf.includes(p)))return name;
    // Also match by email prefix
    const emailKey=CS_REPS[name];
    if(rf.includes(emailKey))return name;
  }
  return null;
}

// ============================================================
// BASELINE PARSING FROM PRIOR PACK
// ============================================================
function parseBaseline(text){
  const match=text.match(/Portfolio Baseline:\s*\$?([\d,]+)/);
  if(match){
    return parseFloat(match[1].replace(/,/g,''));
  }
  return null;
}

function parsePriorDeclinedByRep(text){
  // Parse per-rep declined from prior pack health scorecard section
  const result={};
  const lines=text.split('\n');
  let inHealth=false;
  for(const line of lines){
    if(line.includes('HEALTH SCORECARD'))inHealth=true;
    if(inHealth&&line.includes('SEGMENTATION'))break;
    if(inHealth){
      for(const name of CS_REP_NAMES){
        if(line.includes(name)){
          const dMatch=line.match(/Declined \$([\d,]+)/);
          if(dMatch)result[name]=parseFloat(dMatch[1].replace(/,/g,''));
        }
      }
    }
  }
  return result;
}

// ============================================================
// FLIP PIPELINE STAGING
// ============================================================
function getFlipStage(pctToBaseline){
  const p=parseFloat(pctToBaseline);
  if(isNaN(p)||p<0.85)return{stage:'Stage 1',label:'No Contact',stageNum:1};
  if(p<0.90)return{stage:'Stage 2',label:'85% Intro',stageNum:2};
  if(p<0.95)return{stage:'Stage 3',label:'90% Align',stageNum:3};
  return{stage:'Stage 4',label:'95% Handoff',stageNum:4};
}

// ============================================================
// MAIN HANK PROCESSING ENGINE
// Accepts pre-parsed data returned by the Flask /process endpoint.
// ============================================================
async function processHank(parsedData){
  const setStep=i=>{state.hankStep=i;renderHankProgress();};

  // STEP 0: Data received from server — assign to local variables
  setStep(0);
  await sleep(200);
  const renewalData=parsedData.renewal_rows||[];
  const pastDueData=parsedData.past_due_rows||[];
  const gtpData=parsedData.gtp_rows||[];
  const cancellationData=parsedData.cancellation_rows||[];
  const priorPackText=parsedData.exec_pack_text||null;
  const priorPackBaseline=priorPackText?parseBaseline(priorPackText):null;
  const priorDeclinedByRep=priorPackText?parsePriorDeclinedByRep(priorPackText):{};

  // STEP 1: Filter to CS reps, deduplicate on Contract #
  setStep(1);
  await sleep(400);
  const seen=new Set();
  const csRows=[];
  for(const row of renewalData){
    const repName=matchCSOpsRep(row['Rep']);
    if(!repName)continue;
    const contractNum=row['Contract #']||row['Agreement']||row['Agreement Number'];
    if(!contractNum)continue;
    const key=String(contractNum).trim().toUpperCase();
    if(seen.has(key))continue;
    seen.add(key);
    csRows.push({...row,_rep:repName,_contractKey:key});
  }

  // STEP 2: Baseline & WOW
  setStep(2);
  await sleep(400);
  // Portfolio Baseline: locked constant from server — never derived from the file total
  const currentTotal=csRows.reduce((s,r)=>s+parseFloat(r['Subtotal Sales']||0),0);
  const portfolioBaseline=parsedData.annual_baseline;
  const wowDelta=priorPackBaseline?(currentTotal-priorPackBaseline):0;
  const wowDeltaPct=priorPackBaseline?(wowDelta/priorPackBaseline*100):0;
  const exportFlag=currentTotal>=(portfolioBaseline*0.80)?'OK':'CRITICAL EXPORT GAP';
  const isWeek1=!priorPackBaseline;

  // STEP 3: Digital detection
  setStep(3);
  await sleep(400);
  const isDigital=row=>{
    const si=String(row['Sale Items']||'').toLowerCase();
    return si.includes('digital')||si.includes('listings')||si.includes('google')||si.includes('meta');
  };

  // STEP 4: Segmentation — Declined > Print Only > Renewable
  setStep(4);
  await sleep(400);
  const declined=[],printOnly=[],renewable=[];
  for(const row of csRows){
    const status=String(row['Renew Status']||'').trim();
    const subtotal=parseFloat(row['Subtotal Sales']||0);
    const digital=isDigital(row);
    const saleItems=String(row['Sale Items']||'');
    const base={
      agreementNum:row._contractKey,
      client:String(row['Client']||''),
      rep:row._rep,
      subtotal,
      renewStatus:status,
      saleItems,
      digital:digital?'Digital':'Print',
      lastEdition:row['Last Edition']||null,
      attritionCause:row['Attrition Cause']||'',
      saveOffer:row['Save Offer']||'',
      // penetration fields
      contacted:'',contactType:'',contactDate:'',statusField:'',
      blocker:'',nextStep:'',nextStepDate:'',outcome:'',idp:'',notes:'',
      saveOfferOutcome:'',
      declineTrend:'—',
      formType:'',formAttritionReason:'',formNotes:''
    };
    if(status==='Declined'){declined.push({...base,segment:'Declined'});}
    else if(!digital&&saleItems.toLowerCase().includes('print')&&!saleItems.toLowerCase().includes('digital')&&!saleItems.toLowerCase().includes('listings')){
      printOnly.push({...base,segment:'Print Only Upsell'});
    }
    else if(status==='Renewable'||status==='Renew Eligible'){
      renewable.push({...base,segment:'Renewable'});
    }
  }

  // STEP 5: Build top 20 lists per rep, ranked by subtotal desc, alpha by rep
  setStep(5);
  await sleep(400);
  const buildTop20=(arr)=>{
    const byRep={};
    for(const name of CS_REP_NAMES.sort())byRep[name]=[];
    for(const row of arr){if(byRep[row.rep])byRep[row.rep].push(row);}
    const result=[];
    for(const name of CS_REP_NAMES.sort()){
      const sorted=byRep[name].sort((a,b)=>b.subtotal-a.subtotal).slice(0,20);
      result.push(...sorted);
    }
    return result;
  };
  const declinedList=buildTop20(declined);
  const printOnlyList=buildTop20(printOnly);
  const renewableList=buildTop20(renewable);

  // STEP 6: Match cancellation form to declined accounts
  setStep(6);
  await sleep(400);
  const cancellationMap={};
  for(const row of cancellationData){
    // Column indices based on our analysis:
    // Col 0=timestamp, 1=rep email, 2=agreement/client combined, 3=region, 4=edition
    // 5=form type, 6=last edition, 7=attrition reason(decline), 8=save offer, 9=notes
    // 10=cancellation reason, 11=cancellation sub-reason, 12=save offer(cancellation)
    const vals=Object.values(row);
    const combined=vals[2]?String(vals[2]):'';
    const agNum=extractAgreementNumber(combined);
    if(!agNum)continue;
    const formType=vals[5]?String(vals[5]).trim():'';
    const attritionReason=formType==='DECLINE RENEWAL'?(vals[7]?String(vals[7]):''):(vals[10]?String(vals[10]):'');
    const saveOfferVal=formType==='DECLINE RENEWAL'?(vals[8]?String(vals[8]):''):(vals[12]?String(vals[12]):'');
    const notesVal=vals[9]?String(vals[9]):'';
    cancellationMap[agNum]={formType,attritionReason,saveOffer:saveOfferVal,notes:notesVal};
  }

  // Apply cancellation data to declined list
  for(const row of declinedList){
    const cf=cancellationMap[row.agreementNum];
    if(cf){
      row.formType=cf.formType;
      row.formAttritionReason=cf.attritionReason;
      row.formNotes=cf.notes;
      if(cf.saveOffer&&!row.saveOffer)row.saveOffer=cf.saveOffer;
    }
  }

  // STEP 7: Per-client 4-Factor Health Score
  // Factor 1: Renew Status   40 pts  (Renewable=40, Merged=20, Declined=0)
  // Factor 2: Payment Health 30 pts  (not past due=30, 0-30d=22, 31-60d=15, 61-90d=8, 90+/legal=0)
  // Factor 3: Digital        20 pts  (digital=20, print only=0)
  // Factor 4: Engagement     10 pts  (live from Segmentation fields via engPts/clientHealthScore)
  // _health_base = f1+f2+f3 stored on every row; full score = _health_base + engPts(row) at render time
  setStep(7);
  await sleep(400);

  // Build past-due lookup keyed by agreement number
  const pdAgrLookup={};
  for(const pd of pastDueData){
    const agr=String(pd['Agreement']||pd['Contract #']||pd['Agreement Number']||'').trim().toUpperCase();
    if(!agr)continue;
    const d0_30=parseFloat(pd['Monthly 0 - 30']||0);
    const d31_60=parseFloat(pd['Monthly 31 - 60']||0);
    const d61_90=parseFloat(pd['Monthly 61 - 90']||0);
    const d90p=parseFloat(pd['Monthly 91 - 120']||0)+parseFloat(pd['Monthly 121 - 150']||0)+parseFloat(pd['Monthly 150+']||0);
    const legal=String(pd['Legal']||'').trim().toLowerCase()==='yes';
    pdAgrLookup[agr]={d0_30,d31_60,d61_90,d90p,legal};
  }
  const payPts=key=>{
    const pd=pdAgrLookup[String(key||'').toUpperCase()];
    if(!pd)return 30;
    if(pd.legal||pd.d90p>0)return 0;
    if(pd.d61_90>0)return 8;
    if(pd.d31_60>0)return 15;
    if(pd.d0_30>0)return 22;
    return 30;
  };

  // Phase 1: annotate every csRow with _health_base (f1+f2+f3); build key→base lookup
  const healthBaseByKey={};
  for(const r of csRows){
    const st=String(r['Renew Status']||'').trim();
    const f1=st==='Renewable'?40:st==='Merged'?20:0;
    const f2=payPts(r._contractKey);
    const f3=isDigital(r)?20:0;
    r._health_base=f1+f2+f3;
    healthBaseByKey[r._contractKey]=r._health_base;
  }

  // Phase 2: apply _health_base to seg rows (they are new objects, not csRow references)
  for(const r of [...declinedList,...printOnlyList,...renewableList]){
    r._health_base=healthBaseByKey[r.agreementNum]??0;
  }

  // Phase 3: repMetrics from csRows (_health_base only; engPts=0 at run time)
  const repMetrics={};
  for(const name of CS_REP_NAMES){
    const repRows=csRows.filter(r=>r._rep===name);
    const inScope=repRows.reduce((s,r)=>s+parseFloat(r['Subtotal Sales']||0),0);
    const declinedRev=repRows.filter(r=>String(r['Renew Status']).trim()==='Declined').reduce((s,r)=>s+parseFloat(r['Subtotal Sales']||0),0);
    const digitalRev=repRows.filter(r=>isDigital(r)).reduce((s,r)=>s+parseFloat(r['Subtotal Sales']||0),0);
    const riskPct=inScope>0?(declinedRev/inScope*100):0;
    const digitalMix=inScope>0?(digitalRev/inScope*100):0;
    let declineTrend='—';
    if(!isWeek1&&priorDeclinedByRep[name]!=null){
      const delta=declinedRev-priorDeclinedByRep[name];
      if(delta>0)declineTrend='▲';
      else if(delta<0)declineTrend='▼';
    }
    const n=Math.max(repRows.length,1);
    const healthScore=repRows.reduce((s,r)=>s+r._health_base,0)/n;
    repMetrics[name]={
      rep:name,inScope,declinedRev,digitalRev,riskPct,digitalMix,
      healthScore,healthTier:healthTier(healthScore),declineTrend,isWeek1
    };
  }

  // Apply decline trend to seg rows
  for(const row of [...declinedList,...printOnlyList,...renewableList]){
    row.declineTrend=repMetrics[row.rep]?.declineTrend||'—';
  }

  // STEP 8: Bandwidth
  setStep(8);
  await sleep(400);
  const bandwidth={};
  for(const name of CS_REP_NAMES){
    const repRenewable=new Set(
      csRows.filter(r=>r._rep===name&&String(r['Renew Status']).trim()==='Renewable')
            .map(r=>String(r['Client']||r['client']||'').trim())
            .filter(Boolean)
    ).size;
    const repDeclined=new Set(
      csRows.filter(r=>r._rep===name&&String(r['Renew Status']).trim()==='Declined')
            .map(r=>String(r['Client']||r['client']||'').trim())
            .filter(Boolean)
    ).size;
    // Cancelled: precomputed server-side — unique clients per rep with Cancelled status
    const repCancelled=(parsedData.cancelled_clients_by_rep&&parsedData.cancelled_clients_by_rep[name])||0;
    const active=repRenewable+repDeclined-repCancelled;
    bandwidth[name]={rep:name,renewable:repRenewable,declined:repDeclined,cancelled:repCancelled,active,over:active>BANDWIDTH_CEILING};
  }

  // STEP 9: Renewal concentration (30/60/90 days)
  setStep(9);
  await sleep(400);
  const now=new Date();
  const d30=new Date(now);d30.setDate(d30.getDate()+30);
  const d60=new Date(now);d60.setDate(d60.getDate()+60);
  const d90=new Date(now);d90.setDate(d90.getDate()+90);
  const renewalConc={};
  for(const name of CS_REP_NAMES){
    const repRenewableRows=csRows.filter(r=>r._rep===name&&String(r['Renew Status']).trim()==='Renewable');
    let n30=0,n60=0,n90=0,maxDollar=0;
    for(const row of repRenewableRows){
      let le=row['Last Edition'];
      if(le&&!(le instanceof Date)){try{le=new Date(le);}catch(e){le=null;}}
      if(le&&le instanceof Date&&!isNaN(le)){
        if(le<=d30)n30++;
        if(le<=d60)n60++;
        if(le<=d90)n90++;
      }
      const sub=parseFloat(row['Subtotal Sales']||0);
      if(sub>maxDollar)maxDollar=sub;
    }
    renewalConc[name]={next30:n30,next60:n60,next90:n90,highestDollar:maxDollar};
  }

  // STEP 10: Past Due — match to CS reps
  setStep(10);
  await sleep(400);
  const pastDueByRep={};
  for(const name of CS_REP_NAMES)pastDueByRep[name]=[];
  for(const row of pastDueData){
    const repName=matchCSOpsRep(row['Rep']);
    if(!repName)continue;
    pastDueByRep[repName].push({
      agreement:row['Agreement'],
      client:row['Client'],
      totalDue:parseFloat(row['Total Due']||0),
      d0_30:parseFloat(row['Monthly 0 - 30']||0),
      d31_60:parseFloat(row['Monthly 31 - 60']||0),
      d61_90:parseFloat(row['Monthly 61 - 90']||0),
      d91_120:parseFloat(row['Monthly 91 - 120']||0),
      d121_150:parseFloat(row['Monthly 121 - 150']||0),
      d150plus:parseFloat(row['Monthly 150+']||0),
      pastDueReason:row['Past Due Reason']||'',
      legal:row['Legal']==='Yes',
      collections:row['Collections']==='Yes',
      adPulled:row['Ad Pulled']?true:false
    });
  }

  // STEP 11: Flip pipeline
  setStep(11);
  await sleep(400);
  const flipPubs=gtpData.filter(r=>r['Flip']&&String(r['Flip']).trim().toLowerCase()==='yes'||false);
  // Also include all going-to-print pubs for staging
  const allGtpPubs=gtpData.map(r=>({
    publication:r['Publication']||'',
    publisher:r['Publisher']||'',
    region:r['Region']||'',
    division:r['Division']||'',
    pctToBaseline:r['% to Baseline']||0,
    flip:r['Flip']?String(r['Flip']).trim():'',
    onDeckStatus:r['On Deck Status']||'',
    ...getFlipStage(r['% to Baseline'])
  }));

  const flipOnly=allGtpPubs.filter(p=>p.flip.toLowerCase()==='yes'||p.flip==='Yes');
  const stageCounts={1:0,2:0,3:0,4:0};
  for(const p of allGtpPubs)stageCounts[p.stageNum]=(stageCounts[p.stageNum]||0)+1;

  // STEP 12: Coaching summary generation
  setStep(12);
  await sleep(600);
  const teamHealthScore=Object.values(repMetrics).reduce((s,r)=>s+r.healthScore,0)/CS_REP_NAMES.length;
  const totalDeclined=Object.values(repMetrics).reduce((s,r)=>s+r.declinedRev,0);
  const totalDigitalMix=currentTotal>0?(Object.values(repMetrics).reduce((s,r)=>s+r.digitalRev,0)/currentTotal*100):0;
  const overCeiling=Object.values(bandwidth).filter(b=>b.over);

  // Generate coaching directives per rep
  const coachingActions={};
  for(const name of CS_REP_NAMES){
    const m=repMetrics[name];
    const bw=bandwidth[name];
    const rc=renewalConc[name];
    const pd=pastDueByRep[name];
    const totalPastDue=pd.reduce((s,r)=>s+r.totalDue,0);
    const legalFlags=pd.filter(r=>r.legal).length;
    const actions=[];
    // Declined action
    const declinedCount=declinedList.filter(r=>r.rep===name).length;
    if(m.declinedRev>0){
      actions.push(`Declined exposure at ${fmt$(m.declinedRev)} across ${declinedCount} accounts in the top 20 list. Pull by dollar, make contact, log outcome and Next Step for each before Friday.`);
    }
    // Save target
    const saveTarget=bw.active>450?3:bw.declined>150?2:1;
    actions.push(`Target minimum ${saveTarget} closed save${saveTarget>1?'s':''} this week. Save Closed must be logged in the Outcome field. Contact attempts without closure do not count toward the directive.`);
    // Digital
    if(m.digitalMix<30){
      const gap=(30-m.digitalMix).toFixed(1);
      actions.push(`Digital mix at ${fmtPct(m.digitalMix)} — ${gap} points below 30% target. Identify ${m.digitalMix<20?5:3} print-only accounts for attach conversation. Log contact date and outcome.`);
    }
    // Renewal concentration
    if(rc.next30>20){
      actions.push(`${rc.next30} renewable accounts expiring in 30 days. Highest single account at ${fmt$(rc.highestDollar)}. Work these proactively — do not let renewals lapse without a documented conversation.`);
    }
    // Past due
    if(totalPastDue>0){
      actions.push(`${fmt$(totalPastDue)} in past due balance across ${pd.length} account${pd.length>1?'s':''}${legalFlags>0?` — ${legalFlags} with legal flag, escalate immediately`:''}.`);
    }
    // Bandwidth
    if(bw.over){
      actions.push(`Active account count at ${bw.active} — ${bw.active-BANDWIDTH_CEILING} over the ${BANDWIDTH_CEILING} ceiling. Prioritization is not optional this week. Declined book must move — saves close or cancellations process.`);
    }
    coachingActions[name]=actions;
  }

  // STEP 13: Lock pack
  setStep(13);
  await sleep(400);

  // Assemble final pack
  const pack={
    week:WEEK_LABEL,
    weekDate:new Date().toLocaleDateString(),
    isWeek1,
    dashboard:(()=>{
      const rm=parsedData.revenue_metrics||{};
      return{
        portfolioBaseline,
        currentFileTotal:currentTotal,
        wowDelta,
        wowDeltaPct,
        totalDeclined,
        riskPct:portfolioBaseline>0?(totalDeclined/portfolioBaseline*100):0,
        digitalMix:totalDigitalMix,
        healthScore:teamHealthScore,
        healthTier:healthTier(teamHealthScore),
        exportFlag,
        healthModel:'4-Factor Model — Renew 40 / Payment 30 / Digital 20 / Engagement 10',
        // Revenue metrics from server
        teamMrr:rm.team_mrr||0,
        teamArr:rm.team_arr||0,
        teamTcv:rm.team_tcv||0,
        declinedMrr:rm.declined_mrr||0,
        declinedArr:rm.declined_arr||0,
        declinedTcv:rm.declined_tcv||0,
        digitalMrrMix:rm.digital_mrr_mix||0,
      };
    })(),
    health:CS_REP_NAMES.map(n=>repMetrics[n]),
    bandwidth:CS_REP_NAMES.map(n=>bandwidth[n]),
    renewalConc:CS_REP_NAMES.map(n=>({rep:n,...renewalConc[n]})),
    coachingActions,
    pastDueByRep,
    flipPipeline:{stageCounts,flipPublications:flipOnly,allPubs:allGtpPubs},
    segCounts:{
      declined:{count:declined.length,revenue:declined.reduce((s,r)=>s+r.subtotal,0)},
      printOnly:{count:printOnly.length,revenue:printOnly.reduce((s,r)=>s+r.subtotal,0)},
      renewable:{count:renewable.length,revenue:renewable.reduce((s,r)=>s+r.subtotal,0)}
    },
    validations:parsedData.validations||[],
    validationSummary:parsedData.validation_summary||{total_checks:0,passed:0,warned:0,failed:0,overall_status:'CLEAN'},
    declinePerformance:parsedData.decline_performance||[],
    declinePerformanceSummary:parsedData.decline_performance_summary||{},
    cancellationPendingCount:parsedData.cancellation_pending_count||0,
    renewalLookup:(()=>{const m={};for(const r of csRows)m[r._contractKey]={client:String(r['Client']||''),subtotal:parseFloat(r['Subtotal Sales']||0),rep:r._rep};return m;})(),
  };

  state.pack=pack;
  state.segData={declined:declinedList,printOnly:printOnlyList,renewable:renewableList};

  setStep(14);
  await sleep(300);
}

function sparkPoints(name,score){
  // Deterministic pseudo-random 8-week spark ending at current score
  let seed=name.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const pts=[];
  let v=Math.max(30,score+(rng()-0.5)*30);
  for(let i=0;i<7;i++){v=Math.max(20,Math.min(100,v+(rng()-0.45)*12));pts.push(v);}
  pts.push(score);
  return pts;
}

function choroplethSVG(riskPct){
  const r=Math.min(riskPct||0,100)/100;
  const col=v=>{
    if(v<0.15)return'#4ade80';
    if(v<0.30)return'#a3e635';
    if(v<0.50)return'#facc15';
    if(v<0.70)return'#fb923c';
    return'#ef4444';
  };
  // 6 simplified US regions as rough blocks
  const regions=[
    {x:10, y:10,w:100,h:90, i:r*0.55, label:'West'},
    {x:115,y:10,w:100,h:90, i:r*0.90, label:'Midwest'},
    {x:220,y:10,w:80, h:80, i:r*1.05, label:'NE'},
    {x:10, y:105,w:100,h:80,i:r*0.50, label:'SW'},
    {x:115,y:105,w:100,h:80,i:r*0.72, label:'South'},
    {x:220,y:95, w:80, h:90,i:r*0.85, label:'SE'},
  ];
  return regions.map(({x,y,w,h,i,label})=>`
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${col(Math.min(i,1))}" opacity="0.85" stroke="white" stroke-width="1.5"/>
    <text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif" opacity="0.9">${label}</text>
  `).join('');
}

async function triggerDownload(){
  try{
    const res=await fetch('/export_pack',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pack:state.pack,segData:state.segData,manualContexts:state.manualContexts})
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({error:'Export failed'}));
      throw new Error(err.error||'Export failed');
    }
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const now=new Date();
    const mm=String(now.getMonth()+1).padStart(2,'0');
    const dd=String(now.getDate()).padStart(2,'0');
    const yy=String(now.getFullYear()).slice(-2);
    a.download=`Gatekeeper_ExecutivePack_${mm}${dd}${yy}.xlsx`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    state.dlDone=true;
    render();
  }catch(e){
    alert('Export failed: '+e.message);
  }
}

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,system:CSOPS_SYSTEM,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch{parsed={executionAssessment:raw,repAccountability:[],watchouts:[]};}
    state.brunoOutput=parsed;
  }catch(e){state.brunoError='RUN BRUNO failed. Check connection and retry.';}
  finally{state.brunoRunning=false;stopTimer();render();}
}

// ============================================================
// HANK RUNNER
// POSTs all 5 files to Flask /process, receives parsed row data,
// then runs the processing engine on the returned JSON.
// ============================================================
async function runHank(){
  state.hankRunning=true;state.hankError=null;state.hankStep=0;state.hankDone=false;state.dlDone=false;state.brunoOutput=null;
  render();startTimer();
  try{
    // Build multipart form — field names match Flask REQUIRED_FILES
    const fd=new FormData();
    fd.append('renewal',state.files.renewal);
    fd.append('execpack',state.files.execpack);
    fd.append('pastdue',state.files.pastdue);
    fd.append('gtp',state.files.gtp);
    fd.append('cancellation',state.files.cancellation);

    // Show step 0 (upload in progress) while waiting for server
    state.hankStep=0;renderHankProgress();

    const res=await fetch('/process',{method:'POST',body:fd});
    if(!res.ok){
      let msg='Server error '+res.status;
      try{const j=await res.json();msg=j.error||(j.details?JSON.stringify(j.details):msg);}catch(_){}
      throw new Error(msg);
    }
    const parsedData=await res.json();

    await processHank(parsedData);
    state.hankDone=true;
    state.activeTab=0;
  }catch(e){
    console.error(e);
    state.hankError='RUN HANK failed: '+e.message+'. Check files and retry.';
  }finally{
    state.hankRunning=false;stopTimer();render();
  }
}

        <div style="background:${baselinePct>=95?'var(--success-bg)':baselinePct>=80?'var(--warning-bg)':'var(--danger-bg)'};border:1.5px solid ${baselinePct>=95?'var(--success-border)':baselinePct>=80?'var(--warning-border)':'var(--danger-border)'};border-radius:10px;padding:16px 18px;">

          <div style="font-size:9px;color:var(--text-muted);">${fmtPct(baselinePct)} of baseline</div>
        </div>
        <div style="background:var(--danger-bg);border:1.5px solid var(--danger-border);border-radius:10px;padding:16px 18px;">

        </div>
        <div style="background:${tierBg(d.healthTier)};border:1.5px solid ${tierColor(d.healthTier)}44;border-radius:10px;padding:16px 18px;">
          <div style="font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px;">Team Health Score</div>

      </div>

      <!-- ESRI CANVAS 2x2 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

        <!-- TL: CHOROPLETH -->

                ${['Health','Risk','Digital','BW','Declined'].map(h=>`<th style="padding:5px 8px;font-size:9px;color:${NAVY};font-weight:700;letter-spacing:0.06em;text-align:center;">${h}</th>`).join('')}

            </thead>
            <tbody>
              ${repData.map(({name,h,b})=>{
                const hs=h.healthScore||0,rp=h.riskPct||0,dm=h.digitalMix||0;
                const bwPct=b.active?(b.active/BANDWIDTH_CEILING*100):0;
                const dp=b.active?((b.declined||0)/b.active*100):0;
                const bg=(v,lo,hi,rev)=>rev?(v>=hi?'#dcfce7':v>=lo?'#fef9c3':'#fee2e2'):(v>=hi?'#fee2e2':v>=lo?'#fef9c3':'#dcfce7');
                const tx=(v,lo,hi,rev)=>rev?(v>=hi?'#166534':v>=lo?'#854d0e':'#991b1b'):(v>=hi?'#991b1b':v>=lo?'#854d0e':'#166534');
                const cell=(v,lo,hi,rev,fmt)=>`<td style="padding:4px;text-align:center;"><div style="background:${bg(v,lo,hi,rev)};border-radius:4px;padding:4px 2px;"><span style="font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${tx(v,lo,hi,rev)};">${fmt}</span></div></td>`;
                return`<tr style="border-top:1px solid var(--border);">
                  <td style="padding:6px 8px;font-size:10px;font-weight:700;color:${NAVY};white-space:nowrap;">${name.split(' ')[0]}</td>
                  ${cell(hs,55,70,true,hs.toFixed(0))}
                  ${cell(rp,25,45,false,fmtPct(rp))}
                  ${cell(dm,20,30,true,fmtPct(dm))}
                  ${cell(bwPct,80,100,false,String(b.active||0))}
                  ${cell(dp,25,40,false,String(b.declined||0))}
                </tr>`;
              }).join('')}
            </tbody>
          </table>
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
            <div style="font-size:9px;font-weight:700;color:${NAVY};letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">Revenue Snapshot</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
              ${[['MRR',mrr,mrrRisk],['ARR',arr,arrRisk],['TCV',tcv,tcvRisk]].map(([lbl,val,risk])=>`<div style="background:var(--card-alt);border:1px solid var(--border);border-radius:6px;padding:8px 10px;"><div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;">${lbl}</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${NAVY};">${fmt$(val)}</div><div style="font-size:9px;color:var(--danger);">${fmtPct(risk)} at risk</div></div>`).join('')}
            </div>

        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;">

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
            ${repData.map(({name,h,b,bob})=>{
              const hs=h.healthScore||0;
              const bwPct=Math.min((b.active||0)/BANDWIDTH_CEILING*100,100);
              const hCol=tierColor(h.healthTier);
              const bwCol=b.over?'var(--danger)':bwPct>=85?'var(--warning)':'#16a34a';
              const cx=40,cy=40,r1=30,r2=20;
              return`<div style="background:var(--card-alt);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;">
                <svg width="80" height="80" style="display:block;margin:0 auto 4px;overflow:visible;">
                  <circle cx="${cx}" cy="${cy}" r="${r1}" fill="none" stroke="var(--border)" stroke-width="5"/>
                  <circle cx="${cx}" cy="${cy}" r="${r2}" fill="none" stroke="var(--border)" stroke-width="5"/>
                  ${arc(cx,cy,r1,hs,hCol,5)}
                  ${arc(cx,cy,r2,bwPct,bwCol,5)}
                  <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" font-weight="700" fill="${NAVY}" font-family="'JetBrains Mono',monospace">${hs.toFixed(0)}</text>
                </svg>
                <div style="font-size:10px;font-weight:700;color:${NAVY};margin-bottom:2px;">${name.split(' ')[0]}</div>
                <div style="font-size:9px;color:var(--text-muted);margin-bottom:3px;">${fmt$(bob)}</div>
                <div style="display:flex;justify-content:center;gap:6px;">
                  <div style="display:flex;align-items:center;gap:2px;"><div style="width:6px;height:6px;border-radius:50%;background:${hCol};"></div><span style="font-size:8px;color:var(--text-muted);">H</span></div>
                  <div style="display:flex;align-items:center;gap:2px;"><div style="width:6px;height:6px;border-radius:50%;background:${bwCol};"></div><span style="font-size:8px;color:var(--text-muted);">BW</span></div>
                </div>
                ${b.over?`<div style="font-size:8px;color:var(--danger);font-weight:700;margin-top:2px;">CEILING</div>`:''}
              </div>`;
            }).join('')}
          </div>
          <div style="margin-top:10px;padding:7px 12px;background:${NAVY_PALE};border-radius:6px;display:flex;gap:14px;font-size:9px;color:var(--text-muted);">

              const score=h.healthScore||0;

              const col=tierColor(tier);
              const pts=sparkPoints(name,score);
              const minY=Math.min(...pts),maxY=Math.max(...pts);
              const range=maxY-minY||1;
              const svgW=120,svgH=30;
              const toY=v=>svgH-((v-minY)/range*(svgH-4))-2;
              const pathD=pts.map((v,i)=>`${i===0?'M':'L'} ${(i/(pts.length-1)*svgW).toFixed(1)} ${toY(v).toFixed(1)}`).join(' ');
              return`<div style="display:flex;align-items:center;gap:10px;">
                <div style="font-size:10px;font-weight:700;color:${NAVY};width:50px;flex-shrink:0;">${name.split(' ')[0]}</div>
                <svg width="${svgW}" height="${svgH}" style="flex-shrink:0;overflow:visible;">
                  <path d="${pathD}" fill="none" stroke="${col}44" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
                  <path d="${pathD}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
                  <circle cx="${svgW}" cy="${toY(pts[pts.length-1]).toFixed(1)}" r="3" fill="${col}"/>
                </svg>
                <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${col};width:34px;">${score.toFixed(1)}</span>
                <span class="pill" style="color:${col};background:${tierBg(tier)};border-color:${col}33;font-size:8px;">${tier}</span>
              </div>`;
            }).join('')}
          </div>
          <div style="padding-top:10px;border-top:1px solid var(--border);">
            <div style="font-size:9px;font-weight:700;color:${NAVY};letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px;">Score Bands</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              ${[['85+','Excellent','#16a34a'],['70-84','Healthy','#2563eb'],['55-69','Watchlist','#d97706'],['<55','At Risk','#dc2626']].map(([r,l,c])=>`<div style="display:flex;align-items:center;gap:4px;"><div style="width:9px;height:9px;border-radius:2px;background:${c};"></div><span style="font-size:9px;color:var(--text-muted);">${r} ${l}</span></div>`).join('')}
            </div>
          </div>
        </div>

      </div>
    </div>`;
}

function renderHealthScorecard(){
  const p=state.pack;
  // Live recompute per-rep from current segData — engagement updates reflect immediately
  const allSeg=[...state.segData.declined,...state.segData.printOnly,...state.segData.renewable];
  const repLive={};
  for(const name of CS_REP_NAMES){
    const rows=allSeg.filter(r=>r.rep===name);
    const scores=rows.map(r=>clientHealthScore(r));
    const avg=scores.length>0?scores.reduce((s,v)=>s+v,0)/scores.length:0;
    repLive[name]={
      avg,tier:healthTier(avg),total:scores.length,
      excellent:scores.filter(s=>s>=85).length,
      healthy:scores.filter(s=>s>=70&&s<85).length,
      watchlist:scores.filter(s=>s>=55&&s<70).length,
      atRisk:scores.filter(s=>s<55).length

  }
  return`
    <div class="fade">

      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;padding:10px 14px;background:${NAVY_PALE};border:1px solid ${NAVY}22;border-radius:8px;">
        ${[['Renew Status','40 pts'],['Payment Health','30 pts'],['Digital','20 pts'],['Engagement','10 pts'],['Model','4-Factor']].map(([l,v])=>`
          <div><div style="font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">${l}</div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${NAVY};">${v}</div></div>

        const rep=p.health.find(h=>h.rep===name)||{};

        const rc=p.renewalConc.find(r=>r.rep===name)||{};
        const live=repLive[name]||{avg:0,tier:'At Risk',total:0,excellent:0,healthy:0,watchlist:0,atRisk:0};

        const tot=Math.max(live.total,1);

        <div style="background:${tb};border:1px solid ${tc}22;border-radius:8px;padding:14px 16px;margin-bottom:8px;">

            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:36px;height:36px;border-radius:50%;background:${NAVY_PALE};border:1.5px solid ${NAVY}33;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${NAVY};flex-shrink:0;">${ini(name)}</div>

              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
              <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${rep.declineTrend==='▲'?'var(--danger)':rep.declineTrend==='▼'?'var(--success)':'var(--text-muted)'};">${rep.declineTrend||'—'}</span>

              <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${(rc.next30||0)>40?'var(--danger)':NAVY};">${rc.next30||0} in 30d</div>

function renderContestTracker(){
  const p=state.pack;
  const dp=p.declinePerformance||[];
  const renewableLookup=p.renewalLookup||{};
  // Parse submission timestamp to Date
  const parseCTS=ts=>{if(!ts)return null;const d=new Date(ts);if(!isNaN(d))return d;const m=String(ts).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return new Date(+m[3],+m[1]-1,+m[2]);return null;};
  // Set of current renewable agreement numbers
  const renewableSet=new Set(state.segData.renewable.map(r=>r.agreementNum));

  // Per-rep contest calc
  const rc={};
  for(const name of CS_REP_NAMES){
    const startBob=CONTEST_BOB[name]||0;
    // All matched decline/cancellation entries in contest period for this rep
    const entries=dp.filter(e=>e.rep_name===name&&e.match_status==='matched'&&parseCTS(e.timestamp)>=CONTEST_START_DATE);
    const churnRev=entries.reduce((s,e)=>s+(e.matched_revenue||0),0);
    // Saves = accounts that are now Renewable (reversed)
    const saveEntries=entries.filter(e=>renewableSet.has(e.agreement_number));
    const saveRev=saveEntries.reduce((s,e)=>s+(e.matched_revenue||0),0);
    const netChurn=Math.max(0,churnRev-saveRev);
    const upsells=state.upsellLog.filter(u=>u.rep===name);
    const upsellRev=upsells.reduce((s,u)=>s+(u.revenue||0),0);
    const grr=startBob>0?((startBob-netChurn+upsellRev)/startBob*100):100;
    rc[name]={startBob,churnRev,saveRev,netChurn,upsellRev,grr,saveCount:saveEntries.length,churnCount:entries.length,upsellCount:upsells.length,team:CONTEST_TEAM1.includes(name)?1:2};
  }
  // Team GRR = average of individual GRR% (per-capita normalization)
  const t1Grr=CONTEST_TEAM1.reduce((s,n)=>s+(rc[n]?.grr||100),0)/CONTEST_TEAM1.length;
  const t2Grr=CONTEST_TEAM2.reduce((s,n)=>s+(rc[n]?.grr||100),0)/CONTEST_TEAM2.length;
  const t1Winning=t1Grr>=t2Grr;
  // Individual ranking
  const ranked=CS_REP_NAMES.slice().sort((a,b)=>(rc[b]?.grr||0)-(rc[a]?.grr||0));
  const GOLD='#f0b429',SILVER='#a0aec0',BRONZE='#c07838';
  const rankMedal=i=>i===0?`<span style="font-size:16px;">🥇</span>`:i===1?`<span style="font-size:16px;">🥈</span>`:i===2?`<span style="font-size:16px;">🥉</span>`:`<span style="font-size:12px;font-weight:700;color:var(--text-muted);">#${i+1}</span>`;
  // Contest started gate (badges only visible on/after April 1 2026)
  const contestStarted=new Date()>=CONTEST_START_DATE;
  // Winning-team positional rank (0=1st within team, 1=2nd, 2=3rd, 3=4th/store-credit)
  const winTeam=t1Winning?CONTEST_TEAM1:CONTEST_TEAM2;
  const winTeamRanked=ranked.filter(n=>winTeam.includes(n)); // already GRR-sorted
  const winTeamPos={}; winTeamRanked.forEach((n,i)=>{winTeamPos[n]=i;});
  const teamColor=t=>`color:${t===1?'var(--blue)':'var(--purple)'}`;
  const teamLabel=t=>`Team ${t} · ${t===1?'Kala · Karen · Genele':'Samantha · April · Alex'}`;
  const grrColor=g=>g>=98?'var(--success)':g>=95?'var(--blue)':g>=90?'var(--warning)':'var(--danger)';

  return`
  <div class="fade">
    <!-- Header -->
    <div style="background:${NAVY};border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:14px;font-weight:700;color:white;letter-spacing:0.06em;margin-bottom:3px;">GRR CONTEST</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.6);">April 1 – December 31, 2026 · Best Version Media · Client Success Operations</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;">Gross Revenue Retention</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px;">(Start BoB − Churn + Upsells) / Start BoB × 100</div>
      </div>
    </div>

    <!-- Team Leaderboard -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      ${[[1,CONTEST_TEAM1,t1Grr,t1Winning],[2,CONTEST_TEAM2,t2Grr,!t1Winning]].map(([tNum,members,tGrr,winning])=>`
      <div style="background:${winning?NAVY:'var(--card)'};border:${winning?`2px solid ${NAVY}`:'1px solid var(--border)'};border-radius:10px;padding:16px 20px;position:relative;">
        ${winning?`<div style="position:absolute;top:-10px;right:14px;background:#f0b429;color:${NAVY};font-size:9px;font-weight:700;letter-spacing:0.1em;padding:2px 8px;border-radius:10px;">LEADING</div>`:''}
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:${winning?'rgba(255,255,255,0.6)':'var(--text-muted)'};margin-bottom:6px;">Team ${tNum}</div>
        <div style="font-size:12px;color:${winning?'rgba(255,255,255,0.8)':'var(--text-muted)'};margin-bottom:12px;">${members.join(' · ')}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:${winning?'white':grrColor(tGrr)};line-height:1;">${tGrr.toFixed(2)}<span style="font-size:18px;font-weight:400;color:${winning?'rgba(255,255,255,0.5)':'var(--text-muted)'};">%</span></div>
        <div style="font-size:10px;color:${winning?'rgba(255,255,255,0.5)':'var(--text-muted)'};margin-top:6px;">Avg per-capita GRR · ${members.length} reps</div>
        ${winning&&!t1Winning===tNum-1?`<div style="margin-top:8px;font-size:10px;color:rgba(255,255,255,0.6);">+${Math.abs(tGrr-(tNum===1?t2Grr:t1Grr)).toFixed(2)}% advantage</div>`:''}
      </div>`).join('')}
    </div>

    <!-- Individual Leaderboard -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;">
      <div style="background:${NAVY};padding:10px 16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:10px;font-weight:700;color:white;letter-spacing:0.1em;text-transform:uppercase;">Individual Leaderboard</span>
        <span style="font-size:10px;color:rgba(255,255,255,0.5);">Ranked by GRR% · Per-capita normalized</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:11px;">
        <thead>
          <tr style="background:${NAVY_PALE};">
            ${['Rank','Rep','Team','Start BoB','Churn','Saves','Net Churn','Upsells','GRR %'].map(h=>`<th style="padding:8px 12px;text-align:left;font-size:9px;font-weight:700;color:${NAVY};letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--border);">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${ranked.map((name,i)=>{
            const r=rc[name];
            const inWinTeam=winTeam.includes(name);
            const wtp=winTeamPos[name]; // 0-3 for winning team; undefined for losing team
            // Badge: show only after contest start; losing-team reps get no badge
            let prizeBadge='';
            if(!contestStarted){
              prizeBadge=`<span style="font-size:9px;color:var(--text-muted);background:var(--card-alt);border:1px solid var(--border);padding:1px 5px;border-radius:3px;margin-left:6px;">Contest begins April 1</span>`;
            } else if(inWinTeam){
              if(wtp<=2){
                const bc=wtp===0?GOLD:wtp===1?SILVER:BRONZE;
                prizeBadge=`<span style="font-size:9px;background:${bc};color:white;padding:1px 5px;border-radius:3px;margin-left:6px;">Prize eligible</span>`;
              } else if(wtp===3){
                prizeBadge=`<span style="font-size:9px;background:#6b7280;color:white;padding:1px 5px;border-radius:3px;margin-left:6px;">Store Credit</span>`;
              }
            }
            return`
            <tr style="border-bottom:1px solid var(--border);background:${i%2===0?'var(--card)':'var(--card-alt)'};">
              <td style="padding:9px 12px;">${rankMedal(i)}</td>
              <td style="padding:9px 12px;font-weight:600;color:${NAVY};">${name}${prizeBadge}</td>
              <td style="padding:9px 12px;font-size:10px;color:var(--text-muted);">Team ${r.team}</td>
              <td style="padding:9px 12px;font-family:'JetBrains Mono',monospace;font-weight:700;color:${NAVY};">${fmt$(r.startBob)}</td>
              <td style="padding:9px 12px;font-family:'JetBrains Mono',monospace;color:var(--danger);">${r.churnRev>0?`−${fmt$(r.churnRev)}`:'—'}</td>
              <td style="padding:9px 12px;font-family:'JetBrains Mono',monospace;color:var(--success);">${r.saveRev>0?`+${fmt$(r.saveRev)}`:'—'}</td>
              <td style="padding:9px 12px;font-family:'JetBrains Mono',monospace;color:${r.netChurn>0?'var(--danger)':'var(--success)'};">${r.netChurn>0?`−${fmt$(r.netChurn)}`:'✓ $0'}</td>
              <td style="padding:9px 12px;font-family:'JetBrains Mono',monospace;color:var(--blue);">${r.upsellRev>0?`+${fmt$(r.upsellRev)}`:'—'}</td>
              <td style="padding:9px 12px;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:${grrColor(r.grr)};">${r.grr.toFixed(2)}%</span>
                  <div style="width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
                    <div style="width:${Math.min(r.grr,100).toFixed(1)}%;height:100%;background:${grrColor(r.grr)};"></div>
                  </div>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- Prize Legend + Scoring Legend side by side -->
    <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:12px;margin-bottom:16px;">

function submitUpsell(){
  const agr=(document.getElementById('ct-agr')?.value||'').trim().toUpperCase();
  const rep=document.getElementById('ct-rep')?.value||'';
  const notes=(document.getElementById('ct-notes')?.value||'').trim();
  if(!agr||!rep){alert('Agreement # and Rep are required.');return;}
  const match=(state.pack?.renewalLookup||{})[agr];
  const revenue=match?.subtotal||0;
  const client=match?.client||'—';
  state.upsellLog.push({
    date:new Date().toISOString().split('T')[0],
    agreementNum:agr,client,rep,revenue,notes,
    matched:!!match
  });
  render();
}

function attachEventListeners(){
  // Drag and drop on slots
  FILE_SLOTS.forEach(slot=>{
    const el=$(`slot-${slot.id}`);
    if(!el)return;
    el.ondragover=e=>{e.preventDefault();el.style.borderColor=NAVY;el.style.background=NAVY_PALE;};
    el.ondragleave=()=>{if(!state.files[slot.id]){el.style.borderColor='';el.style.background='';}};
    el.ondrop=e=>{
      e.preventDefault();
      const f=e.dataTransfer.files[0];
      if(f){state.files[slot.id]=f;render();}
    };
  });
}

function handleFileInput(slotId,input){
  if(input.files[0]){
    state.files[slotId]=input.files[0];
    render();
  }
}

function setSegCat(cat){state.segCategory=cat;render();}
function toggleBruno(){state.brunoOpen=!state.brunoOpen;render();}
